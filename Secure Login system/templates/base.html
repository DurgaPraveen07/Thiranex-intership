<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Secure Login System{% endblock %}</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #08111f;
      --bg-soft: #101a2f;
      --card: rgba(14, 23, 41, 0.9);
      --border: rgba(160, 190, 255, 0.16);
      --text: #f4f7fb;
      --muted: #a8b5cc;
      --accent: #5dd6c5;
      --accent-strong: #28b8b0;
      --danger: #ff7d7d;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(93, 214, 197, 0.14), transparent 35%),
        radial-gradient(circle at bottom right, rgba(88, 121, 255, 0.18), transparent 30%),
        linear-gradient(160deg, var(--bg), #050914 70%);
      color: var(--text);
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    .shell {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 48px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: rgba(7, 13, 24, 0.75);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .brand strong {
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.82rem;
      color: var(--accent);
    }

    .brand span {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .navlinks {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .navlinks a,
    .navlinks button,
    .button,
    .button-secondary {
      border: 0;
      border-radius: 999px;
      padding: 11px 16px;
      font: inherit;
      cursor: pointer;
      transition: transform 160ms ease, opacity 160ms ease, background 160ms ease;
    }

    .navlinks a:hover,
    .navlinks button:hover,
    .button:hover,
    .button-secondary:hover {
      transform: translateY(-1px);
    }

    .navlinks a,
    .button {
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #06101a;
      font-weight: 700;
    }

    .button-secondary,
    .navlinks button {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .content {
      margin-top: 24px;
      display: grid;
      gap: 20px;
    }

    .hero,
    .card {
      border: 1px solid var(--border);
      border-radius: 28px;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .hero {
      padding: 36px;
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(280px, 0.9fr);
      gap: 24px;
      align-items: center;
    }

    .hero h1,
    .card h1,
    .card h2 {
      margin-top: 0;
      line-height: 1.05;
    }

    .hero h1 {
      font-size: clamp(2.2rem, 5vw, 4.4rem);
      margin-bottom: 14px;
    }

    .hero p,
    .card p,
    .card li,
    .hint {
      color: var(--muted);
      line-height: 1.65;
    }

    .panel {
      padding: 24px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(93, 214, 197, 0.08), rgba(255, 255, 255, 0.02));
      border: 1px solid rgba(93, 214, 197, 0.15);
    }

    .grid {
      display: grid;
      gap: 20px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .card {
      padding: 28px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #dfe7f5;
      font-size: 0.95rem;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      font: inherit;
      outline: none;
    }

    input:focus {
      border-color: rgba(93, 214, 197, 0.6);
      box-shadow: 0 0 0 3px rgba(93, 214, 197, 0.12);
    }

    .errors,
    .messages {
      list-style: none;
      padding: 0;
      margin: 0 0 18px;
    }

    .errors li,
    .messages li {
      padding: 12px 14px;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .errors li {
      background: rgba(255, 125, 125, 0.12);
      color: #ffd2d2;
      border: 1px solid rgba(255, 125, 125, 0.24);
    }

    .messages li {
      background: rgba(93, 214, 197, 0.12);
      color: #ccfff8;
      border: 1px solid rgba(93, 214, 197, 0.22);
    }

    .split {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .token-box {
      padding: 16px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      word-break: break-all;
    }

    .footer-note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.94rem;
    }

    @media (max-width: 860px) {
      .hero,
      .grid {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <strong>Thiranex Task 4</strong>
        <span>Secure Login System</span>
      </div>
      <div class="navlinks">
        {% if user.is_authenticated %}
          <a href="{% url 'dashboard' %}">Dashboard</a>
          <a href="{% url 'two_factor_setup' %}">2FA Setup</a>
          <form action="{% url 'logout' %}" method="post" style="display:inline; margin: 0;">
            {% csrf_token %}
            <button type="submit">Logout</button>
          </form>
        {% else %}
          <a href="{% url 'login' %}">Login</a>
          <a href="{% url 'register' %}">Register</a>
        {% endif %}
      </div>
    </header>

    <main class="content">
      {% if messages %}
        <ul class="messages">
          {% for message in messages %}
            <li>{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
